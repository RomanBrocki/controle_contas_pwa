  <script type="text/babel">

    function parseBRL(str){
      const s = String(str).replace(/[^\d,]/g, '').replace(/\.(?=\d)/g,'');
      return Number(s.replace(',', '.')) || 0;
    }

    function todayISO(){
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${yyyy}-${mm}-${dd}`;
    }


    function parseBRtoISO(ddmmyyyy){
      const m = String(ddmmyyyy||'').match(/(\d{2})\/(\d{2})\/(\d{4})/);
      if (!m) return '';
      const [,dd,mm,yyyy] = m;
      return `${yyyy}-${mm}-${dd}`;
    }

    function CanvasPlaceholder({ aspect='16/9' }){

  const themeIds = window.ThemeCatalog?.THEME_IDS || ['gunmetal', 'synth', 'titanium', 'bronze', 'alloy', 'light'];
  const themeSelector = themeIds.map((themeId) => `.theme-${themeId}`).join(', ');
  const themeClasses = themeIds.map((themeId) => `theme-${themeId}`);

  function getThemeClass() {
    const themed = rootEl.querySelector(themeSelector);
    if (!themed) return null;
    return themeClasses.find((themeClass) => themed.classList.contains(themeClass)) || null;
  }

  function syncTheme() {
    const cls = getThemeClass();
    document.body.classList.remove(...themeClasses);
    if (cls) document.body.classList.add(cls);
  }
  
  // sincroniza agora e toda vez que mudar algo no subtree
  syncTheme();
  new MutationObserver(syncTheme).observe(rootEl, { attributes:true, childList:true, subtree:true });
  </script>

  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async function () {
      const hadController = Boolean(navigator.serviceWorker.controller);
      let refreshing = false;

      function watchInstallingWorker(worker) {
        if (!worker) return;
        worker.addEventListener("statechange", function () {
          if (worker.state === "installed" && navigator.serviceWorker.controller) {
            worker.postMessage({ type: "SKIP_WAITING" });
          }
        });
      }

      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (!hadController || refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      try {
        const registration = await navigator.serviceWorker.register("./sw.js?v=2026-03-14-9");
        watchInstallingWorker(registration.installing);
        registration.addEventListener("updatefound", function () {
          watchInstallingWorker(registration.installing);
        });

        if (registration.waiting) {
          registration.waiting.postMessage({ type: "SKIP_WAITING" });
        }

        registration.update().catch(function () {});
        console.log("Service Worker registrado.");
      } catch (err) {
        console.warn("Service Worker falhou:", err);
      }
    });
  }
</script>
<script>
  // Evita apenas o "pull to refresh", sem travar rolagem normal
  (function () {
    let startY = 0;
    window.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
    }, { passive: false });

    window.addEventListener('touchmove', e => {
      const currentY = e.touches[0].clientY;
      const isScrollingDown = currentY > startY;
      if (window.scrollY === 0 && isScrollingDown) {
        e.preventDefault();
      }
    }, { passive: false });
  })();
</script>
